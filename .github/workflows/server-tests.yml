name: Server tests

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lnyq
          POSTGRES_PASSWORD: lnyq
          POSTGRES_DB: lnyq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Push Prisma schema to test DB
        working-directory: server
        env:
          DATABASE_URL: postgresql://lnyq:lnyq@localhost:5432/lnyq_test
        run: npx prisma db push --skip-generate

      - name: Run server tests
        working-directory: server
        env:
          DATABASE_URL: postgresql://lnyq:lnyq@localhost:5432/lnyq_test
        run: npm test
